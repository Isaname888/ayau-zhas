<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Travel World Pro</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
  }

  /* ================= VIDEO BACKGROUND ================= */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    object-fit: cover;
    z-index: -2;
    filter: brightness(0.6) contrast(1.2) saturate(1.3);
  }

  /* красивый цветной слой */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(0, 200, 255, 0.25),
      rgba(255, 0, 150, 0.2),
      rgba(0, 0, 0, 0.5)
    );
    z-index: -1;
  }

  /* ================= HEADER ================= */
  header {
    text-align: center;
    padding: 120px 20px;
  }

  header h1 {
    font-size: 60px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(0,200,255,0.8);
  }

  header p {
    font-size: 20px;
    color: #e0e0e0;
  }

  /* ================= BUTTON ================= */
  .btn {
    margin-top: 25px;
    padding: 14px 32px;
    border: none;
    border-radius: 40px;
    cursor: pointer;

    background: linear-gradient(90deg, #00c6ff, #ff3cac);
    color: white;
    font-weight: bold;

    transition: 0.3s ease;
    box-shadow: 0 0 20px rgba(0,200,255,0.5);
  }

  .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 35px rgba(255,60,172,0.7);
  }

  /* ================= CARDS ================= */
  .section {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 60px;
  }

  .card {
    width: 220px;
    padding: 25px;
    text-align: center;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);

    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.2);

    transition: 0.3s ease;
  }

  .card:hover {
    transform: translateY(-12px) scale(1.03);
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,200,255,0.4);
  }

</style>
</head>

<body>

<!-- ================= VIDEO ================= -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- ================= CONTENT ================= -->
<header>
  <h1>TRAVEL WORLD 🌍</h1>
  <p>Explore beautiful places around the world</p>
  <button class="btn">Start Journey</button>
</header>

<div class="section">
  <div class="card">🏝 Beaches</div>
  <div class="card">🏔 Mountains</div>
  <div class="card">🌆 Cities</div>
</div>

</body>
</html>
